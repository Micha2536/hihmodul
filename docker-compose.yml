services:
  vhih:
    build: .
    container_name: vhih-modul
    restart: unless-stopped

    # For MotionBlinds multicast/UDP: prefer host networking.
    # network_mode: host
    # If you enable host networking, remove the ports section below.

    environment:
      TZ: Europe/Berlin
      DATA_DIR: /app/data
      DEBUG_HOMEEAPI: "1"

    volumes:
      - ./data:/app/data:rw
    network_mode: "host"
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: vhih-mqtt-broker
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/mosquitto/data:/mosquitto/data:rw
      - ./docker/mosquitto/log:/mosquitto/log:rw

